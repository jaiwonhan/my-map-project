<!DOCTYPE html>
<html>
<head>
  <title>물건/유사사례/매매사례 위치도</title>
  <meta charset="utf-8">
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6eeecb35764068b879f54c7b4bd79610&libraries=services,clusterer"></script>
  <style>
    .marker {
      display: inline-block;
      padding: 3px 5px;
      border-radius: 5px;
      border: 1px solid #0044CC;
      font-size: 8px;
      font-weight: bold;
      text-align: center;
      color: black;
    }
    .marker.type1 { background-color: #A8B9FF; }
    .marker.type2, .marker.type3, .marker.type4 {
      background-color: #D1E8FF;
    }
    .marker.type5, .marker.type6, .marker.type7, .marker.type8, .marker.type9 {
      background-color: #E8FFD1;
    }
    .form-container {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 400px;
      z-index: 1;
    }
    .form-group {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .form-group label {
      width: 100px;
      text-align: right;
      margin-right: 10px;
    }
    .form-group input {
      width: calc(100% - 120px);
      height: 25px;
      padding: 5px;
      font-size: 14px;
    }
    button {
      font-size: 14px;
      padding: 5px 10px;
    }
    #map {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
  </style>
</head>
<body onload="initMap()">
  <div class="form-container">
    <h1>물건/유사사례/매매사례 위치도</h1>
    <form onsubmit="event.preventDefault(); searchAddresses();">
      <div id="addresses">
        <div class="form-group">
          <label>본건:</label>
          <input type="text" id="addressInput1" placeholder="예: 서울특별시 중구 세종대로 110">
        </div>
        <div class="form-group">
          <label>사례1:</label>
          <input type="text" id="addressInput2" placeholder="예: 서울특별시 강남구 테헤란로 152">
        </div>
        <div class="form-group">
          <label>사례2:</label>
          <input type="text" id="addressInput3" placeholder="예: 부산광역시 해운대구 우동 1468">
        </div>
        <div class="form-group">
          <label>사례3:</label>
          <input type="text" id="addressInput4" placeholder="예: 대전광역시 서구 둔산대로 100">
        </div>
        <div class="form-group">
          <label>실거래1:</label>
          <input type="text" id="addressInput5" placeholder="예: 대구광역시 북구 팔달로 10">
        </div>
        <div class="form-group">
          <label>실거래2:</label>
          <input type="text" id="addressInput6" placeholder="예: 광주광역시 남구 봉선로 1">
        </div>
        <div class="form-group">
          <label>실거래3:</label>
          <input type="text" id="addressInput7" placeholder="예: 제주특별자치도 제주시 중앙로 120">
        </div>
        <div class="form-group">
          <label>실거래4:</label>
          <input type="text" id="addressInput8" placeholder="예: 울산광역시 남구 삼산로 150">
        </div>
        <div class="form-group">
          <label>실거래5:</label>
          <input type="text" id="addressInput9" placeholder="예: 인천광역시 연수구 송도국제대로 10">
        </div>
      </div>
      <button type="submit">주소 조회</button>
    </form>
  </div>
  <div id="map"></div>
  <script>
    let map;
    let clusterer;
    let existingMarkers = [];
    let offsetMap = new Map(); // 동일 좌표 처리용 맵

    // 지도 초기화
    function initMap() {
      map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(37.5665, 126.9780), // 서울 중심
        level: 7
      });
      clusterer = new kakao.maps.MarkerClusterer({
        map: map,
        averageCenter: true,
        minLevel: 7
      });
    }

    // 동일 좌표에 대한 오프셋 계산 (2미터 간격 적용)
    function applyOffset(coords) {
      const coordKey = `${coords.getLat()},${coords.getLng()}`;

      // 동일 좌표에 대한 처리
      if (!offsetMap.has(coordKey)) {
        offsetMap.set(coordKey, 0);
        return coords; // 중복되지 않으면 원래 위치 반환
      }

      const offsetCount = offsetMap.get(coordKey);

      // 2m 간격 계산
      const offsetStepLat = 2 / 111320; // 약 0.000018도 (위도)
      const offsetStepLng = getLongitudeOffset(coords.getLat(), 2); // 경도 계산

      // 8방향 분산 및 반경 증가
      const angle = (offsetCount % 8) * (Math.PI / 4); // 8방향 (0도, 45도 등)
      const radius = Math.ceil((offsetCount + 1) / 8); // 한 바퀴 돌 때마다 반경 증가

      const latOffset = Math.sin(angle) * radius * offsetStepLat;
      const lngOffset = Math.cos(angle) * radius * offsetStepLng;

      const newCoords = new kakao.maps.LatLng(
        coords.getLat() + latOffset,
        coords.getLng() + lngOffset
      );

      offsetMap.set(coordKey, offsetCount + 1);
      return newCoords;
    }

    // 경도 보정용 계산 함수
    function getLongitudeOffset(lat, meters) {
      const earthRadius = 6378137; // 지구 반지름 (m)
      const latRad = (Math.PI / 180) * lat; // 위도를 라디안으로 변환
      const lngMeters = Math.cos(latRad) * earthRadius; // 위도 따른 경도 거리 계산
      return meters / lngMeters * (180 / Math.PI); // 경도를 meters로 변환
    }

    // 주소 검색 및 마커 생성
    function searchAddresses() {
      resetMarkers();
      const geocoder = new kakao.maps.services.Geocoder();
      let firstAddressCoords = null;

      for (let i = 1; i <= 9; i++) {
        const inputElement = document.getElementById("addressInput" + i);
        const address = inputElement.value.trim();
        if (!address) continue;

        geocoder.addressSearch(address, (result, status) => {
          if (status === kakao.maps.services.Status.OK) {
            let coords = new kakao.maps.LatLng(result[0].y, result[0].x);

            // "본건"의 경우 중심 이동
            if (!firstAddressCoords) {
              firstAddressCoords = coords;
              map.setCenter(coords); // 지도 중심 이동
            }

            coords = applyOffset(coords); // 마커 위치 조정
            const marker = createHtmlMarker(coords, i);
            existingMarkers.push(marker);
            marker.setMap(map);
            clusterer.addMarker(marker);
          } else {
            console.error(`"${address}"를 찾을 수 없습니다.`);
          }
        });
      }
    }

    // 마커 초기화
    function resetMarkers() {
      existingMarkers.forEach(marker => marker.setMap(null));
      clusterer.clear();
      existingMarkers = [];
      offsetMap.clear(); // 오프셋 맵 초기화
    }

    // HTML 마커 생성
    function createHtmlMarker(coords, type) {
      const el = document.createElement("div");
      el.className = `marker type${type}`;
      el.innerText = type === 1 ? "본건" : type <= 4 ? `사례${type - 1}` : `실거래${type - 4}`;
      return new kakao.maps.CustomOverlay({
        position: coords,
        content: el,
      });
    }
  </script>
</body>
</html>
