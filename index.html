<!DOCTYPE html>
<html>
<head>
  <title>물건/유사사례/매매사례 위치도 v1.3</title>
  <meta charset="utf-8">
  <!-- v.1.3 -->
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6eeecb35764068b879f54c7b4bd79610&libraries=services,clusterer"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* ── 인쇄 ── */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .form-container, #routePanel, #captureBar { display: none !important; }
      #printWatermark { display: block !important; }
      #map { position: fixed !important; inset: 0 !important; width:100% !important; height:100% !important; }
      body { overflow: visible !important; }
    }
    #printWatermark {
      display: none; position: fixed; bottom: 12px; right: 14px;
      font-size: 10px; color: #aaa; z-index: 9999;
      background: rgba(255,255,255,0.85); padding: 3px 8px; border-radius: 4px;
    }

    /* ── 패널 ── */
    .form-container {
      position: absolute; top: 20px; left: 20px;
      background: rgba(255,255,255,0.97); padding: 16px;
      border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      width: 650px; z-index: 10;
      max-height: calc(100vh - 40px); overflow-y: auto;
    }
    .form-container h1 {
      font-size: 14px; margin-bottom: 10px; color: #222;
      border-bottom: 1px solid #ddd; padding-bottom: 8px;
      position: sticky; top: 0; background: rgba(255,255,255,0.97); z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
    }
    .h1-btns { display: flex; gap: 5px; }
    .h1-btn {
      padding: 3px 9px; font-size: 11px; border-radius: 5px;
      border: 1px solid #ddd; background: #f8f9ff;
      color: #555; cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .h1-btn:hover { background: #eef1ff; border-color: #4A6FFF; color: #4A6FFF; }
    .h1-btn.active { background: rgba(74,111,255,0.12); border-color: #4A6FFF; color: #4A6FFF; }

    /* ── 헤더 컬럼 ── */
    .form-header {
      display: flex; align-items: center; margin-bottom: 5px;
      position: sticky; top: 34px; background: rgba(255,255,255,0.97); z-index: 1; padding-bottom: 3px;
    }
    .form-header .col-drag  { width: 16px; margin-right: 4px; flex-shrink: 0; }
    .form-header .col-type  { width: 72px; font-size: 11px; color: #888; margin-right: 6px; flex-shrink: 0; }
    .form-header .col-color { width: 24px; font-size: 11px; color: #888; margin-right: 6px; flex-shrink: 0; text-align: center; }
    .form-header .col-addr  { flex: 1; font-size: 11px; color: #888; margin-right: 6px; }
    .form-header .col-memo  { width: 90px; font-size: 11px; color: #888; margin-right: 6px; flex-shrink: 0; }
    .form-header .col-dist  { width: 120px; font-size: 11px; color: #888; flex-shrink: 0; text-align: center; }
    .form-header .col-del   { width: 26px; flex-shrink: 0; }

    /* ── 행 ── */
    .form-group {
      display: flex; align-items: center; margin-bottom: 5px;
      border-radius: 6px; transition: background 0.15s; position: relative;
    }
    .form-group.drag-over { background: #eef1ff; outline: 2px dashed #4A6FFF; }
    .form-group.dragging  { opacity: 0.4; }

    .drag-handle {
      width: 16px; margin-right: 4px; flex-shrink: 0;
      color: #ccc; font-size: 14px; cursor: grab; user-select: none; text-align: center; line-height: 1;
    }
    .drag-handle:hover { color: #888; }
    .drag-handle.fixed  { visibility: hidden; cursor: default; }

    .input-type {
      width: 72px; height: 26px; padding: 4px 6px; font-size: 11px;
      border: 1px solid #ccc; border-radius: 4px; margin-right: 6px; flex-shrink: 0; font-family: inherit;
    }
    .addr-wrap { flex: 1; position: relative; margin-right: 6px; }
    .input-addr {
      width: 100%; height: 26px; padding: 4px 6px; font-size: 11px;
      border: 1px solid #ccc; border-radius: 4px; font-family: inherit;
    }
    .input-memo {
      width: 90px; height: 26px; padding: 4px 6px; font-size: 10px;
      border: 1px solid #e0e0e0; border-radius: 4px; margin-right: 6px;
      flex-shrink: 0; font-family: inherit; color: #555; background: #fafafa;
    }
    .input-memo::placeholder { color: #bbb; }
    .input-type:focus, .input-addr:focus, .input-memo:focus { outline: none; border-color: #4A6FFF; }

    /* ── 자동완성 ── */
    .autocomplete-list {
      display: none; position: absolute; top: 28px; left: 0;
      width: 100%; background: white; border: 1px solid #ddd;
      border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 300; max-height: 220px; overflow-y: auto;
    }
    .autocomplete-list.open { display: block; }
    .ac-item { padding: 7px 10px; cursor: pointer; border-bottom: 1px solid #f5f5f5; transition: background 0.1s; }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: #eef1ff; }
    .ac-name { font-size: 12px; font-weight: bold; color: #222; }
    .ac-addr { font-size: 10px; color: #888; margin-top: 2px; }

    /* ── 거리 셀 ── */
    .dist-cell {
      width: 120px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: flex-start; gap: 1px;
    }
    .dist-cell .dc-time  { font-size: 10px; font-weight: bold; color: #4A6FFF; white-space: nowrap; }
    .dist-cell .dc-dist  { font-size: 10px; font-weight: bold; color: #e8710a; white-space: nowrap; }
    .dist-cell .dc-line  { font-size: 10px; font-weight: bold; color: #34a853; white-space: nowrap; }
    .dist-cell .dc-empty { font-size: 10px; color: #ccc; }
    .dist-cell.is-main   { visibility: hidden; }

    /* ── 색상 ── */
    .color-pick {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid #ddd; cursor: pointer; margin-right: 6px; flex-shrink: 0; position: relative;
    }
    .color-pick:hover { border-color: #999; }
    .color-popup {
      display: none; position: absolute; top: 26px; left: 0; z-index: 200;
      background: white; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      padding: 6px; gap: 5px; flex-wrap: wrap; width: 130px;
    }
    .color-popup.open { display: flex; }
    .color-swatch {
      width: 20px; height: 20px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent; transition: transform 0.1s;
    }
    .color-swatch:hover { transform: scale(1.2); border-color: #555; }

    /* ── 버튼 ── */
    .btn-del {
      width: 22px; height: 22px; border-radius: 50%;
      background: #f1f3f4; border: 1px solid #ddd; color: #aaa; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 4px; transition: all 0.15s;
    }
    .btn-del:hover { background: #ffebee; color: #d93025; border-color: #f4a9a9; }

    .btn-add-row {
      width: 100%; padding: 6px; margin-top: 6px;
      background: #f8f9ff; border: 1px dashed #4A6FFF; color: #4A6FFF;
      border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-add-row:hover { background: #eef1ff; }
    .btn-add-row:disabled { background: #f5f5f5; border-color: #ccc; color: #bbb; cursor: not-allowed; }
    .row-count-info { font-size: 10px; color: #aaa; text-align: right; margin-top: 3px; margin-bottom: 2px; }

    .btn-row {
      display: flex; gap: 6px; margin-top: 10px;
      position: sticky; bottom: 0; background: rgba(255,255,255,0.97); padding-top: 8px; padding-bottom: 2px;
    }
    .btn { flex: 1; padding: 7px 0; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .btn-primary { background: #4A6FFF; color: white; }
    .btn-primary:hover { background: #3658e0; }
    .btn-route   { background: #34a853; color: white; }
    .btn-route:hover { background: #257a3e; }
    .btn-route.active { background: #d93025; }
    .btn-clear   { background: #f1f3f4; color: #444; border: 1px solid #ccc; }
    .btn-clear:hover { background: #e0e0e0; }

    /* ── 경로 패널 ── */
    #routePanel {
      position: absolute; left: 20px; top: auto;
      background: rgba(255,255,255,0.97); border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      padding: 14px 16px; z-index: 10; width: 650px;
      display: none; max-height: 280px; overflow-y: auto;
    }
    #routePanel h3 {
      font-size: 13px; color: #222; border-bottom: 1px solid #eee;
      padding-bottom: 6px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .rp-close {
      font-size: 11px; color: #aaa; cursor: pointer; font-weight: 400;
      padding: 2px 7px; border-radius: 4px; border: 1px solid #eee; transition: all 0.15s;
    }
    .rp-close:hover { background: #ffebee; color: #d93025; border-color: #f4a9a9; }
    .route-item {
      display: flex; align-items: center;
      padding: 5px 0; border-bottom: 1px dashed #f0f0f0; font-size: 11px; gap: 6px;
    }
    .route-item:last-child { border-bottom: none; }
    .route-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .route-seg  { flex: 1; font-weight: bold; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .route-time { color: #4A6FFF; font-weight: bold; white-space: nowrap; font-size: 11px; }
    .route-dist { color: #34a853; font-weight: bold; white-space: nowrap; font-size: 11px; }
    .route-total { margin-top: 10px; padding-top: 8px; border-top: 2px solid #eee; font-size: 12px; }
    .route-total-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .route-total-label { color: #555; }
    .route-total-val.time { color: #4A6FFF; font-weight: bold; }
    .route-total-val.dist { color: #34a853; font-weight: bold; }

    /* ── 인쇄 바 ── */
    #captureBar {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.97); border: 1px solid #ddd;
      border-radius: 10px; padding: 12px 18px; z-index: 15;
      display: none; gap: 10px; align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    #captureBar.show { display: flex; }
    .cap-info strong { display: block; font-size: 12px; color: #222; margin-bottom: 2px; }
    .cap-info span   { font-size: 10px; color: #888; }
    .cap-btn {
      padding: 7px 14px; border-radius: 6px; border: 1px solid transparent;
      font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .cap-btn.print { background: #4A6FFF; color: white; }
    .cap-btn.print:hover { background: #3658e0; }
    .cap-btn.shot  { background: #f0fdf4; border-color: #34a853; color: #34a853; }
    .cap-btn.shot:hover { background: #dcfce7; }
    .cap-btn.cls   { background: #f1f3f4; border-color: #ddd; color: #888; }
    .cap-btn.cls:hover { background: #ffebee; border-color: #f4a9a9; color: #d93025; }

    /* ── 마커 ── */
    .kakao-marker {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 4px 9px; border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.5);
      font-size: 11px; font-weight: bold; color: white;
      white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      cursor: pointer; user-select: none; transition: filter 0.1s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .kakao-marker:hover { filter: brightness(1.12); }
    .mk-icon { font-size: 9px; opacity: 0.85; }

    /* ── 팝업 ── */
    .marker-popup {
      background: white; border-radius: 8px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.25);
      padding: 10px 14px 10px 12px; font-size: 12px;
      min-width: 160px; max-width: 240px; position: relative;
    }
    .marker-popup .pop-title { font-weight: bold; font-size: 13px; margin-bottom: 3px; color: #222; padding-right: 16px; }
    .marker-popup .pop-addr  { color: #666; font-size: 11px; white-space: normal; line-height: 1.5; }
    .marker-popup .pop-memo  { margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; font-size: 11px; color: #4A6FFF; font-weight: 600; }
    .marker-popup .pop-close {
      position: absolute; top: 7px; right: 9px;
      cursor: pointer; color: #aaa; font-size: 15px; line-height: 1;
    }
    .marker-popup .pop-close:hover { color: #333; }
    .marker-popup::after {
      content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      border: 8px solid transparent; border-top-color: white; border-bottom: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="form-container">
    <h1>
      물건 / 유사사례 / 매매사례 위치도
      <div class="h1-btns">
        <button class="h1-btn" id="cadastralBtn" onclick="toggleCadastral()">🗺 지적편집도</button>
        <button class="h1-btn" onclick="toggleCaptureBar()">🖨️ 인쇄/캡처</button>
      </div>
    </h1>

    <div class="form-header">
      <span class="col-drag"></span>
      <span class="col-type">구분</span>
      <span class="col-color">색</span>
      <span class="col-addr">주소 / 지명 검색</span>
      <span class="col-memo">면적 / 단가</span>
      <span class="col-dist">본건 기준 거리</span>
      <span class="col-del"></span>
    </div>

    <div id="rowList"></div>
    <div class="row-count-info" id="rowCountInfo"></div>
    <button class="btn-add-row" id="btnAddRow" onclick="addRow()">+ 행 추가</button>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="searchAddresses()">🔍 주소 조회</button>
      <button class="btn btn-route" id="routeBtn" onclick="toggleRoute()">경로 보기</button>
      <button class="btn btn-clear" onclick="clearAll()">초기화</button>
    </div>
  </div>

  <div id="routePanel">
    <h3>
      🚗 순차 경로
      <span class="rp-close" onclick="clearRoute()">✕ 닫기</span>
    </h3>
    <div id="routeList"></div>
    <div id="routeTotal"></div>
  </div>

  <div id="captureBar">
    <div class="cap-info">
      <strong>🖨️ 인쇄 / 캡처</strong>
      <span>인쇄 시 패널이 자동으로 숨겨집니다</span>
    </div>
    <button class="cap-btn print" onclick="doPrint()">인쇄</button>
    <button class="cap-btn shot"  onclick="doScreenshot()">📷 캡처</button>
    <button class="cap-btn cls"   onclick="toggleCaptureBar()">✕</button>
  </div>

  <div id="printWatermark">물건/유사사례/매매사례 위치도</div>

  <script>
    const MAX_ROWS      = 10;
    const PALETTE       = ['#4A6FFF','#FF5C5C','#66BB6A','#FFA726','#AB47BC'];
    const PALETTE_NAMES = ['파랑','빨강','초록','주황','보라'];
    const ROUTE_COLORS  = ['#e8410a','#1a73e8','#34a853','#ea4335','#9c27b0','#00bcd4','#ff5722','#607d8b','#f06292','#aed581'];
    const OSRM = 'https://router.project-osrm.org/route/v1/driving';

    const INIT_ROWS = [
      { type: '본건',    color: '#4A6FFF' },
      { type: '사례1',   color: '#FF5C5C' },
      { type: '사례2',   color: '#66BB6A' },
      { type: '실거래1', color: '#FFA726' },
      { type: '실거래2', color: '#AB47BC' },
    ];

    let rowIdCounter = 0;
    let rowColors    = {};
    let dragSrcId    = null;
    let psService    = null;
    let acTimers     = {};
    let acActiveIdx  = {};
    let isCadastral  = true;

    let map, geocoder;
    let markerOverlays = [], routePolylines = [], markerList = [];
    let popupOverlay   = null;
    let isRouteShown   = false;

    /* ─── 행 관리 ─── */
    function getRowCount() {
      return document.querySelectorAll('#rowList .form-group').length;
    }
    function updateAddBtn() {
      const count = getRowCount();
      const btn   = document.getElementById('btnAddRow');
      const info  = document.getElementById('rowCountInfo');
      info.textContent = `${count} / ${MAX_ROWS}개`;
      btn.disabled    = count >= MAX_ROWS;
      btn.textContent = count >= MAX_ROWS ? `최대 ${MAX_ROWS}개까지 추가 가능합니다` : '+ 행 추가';
    }

    function addRow(initData = {}) {
      if (getRowCount() >= MAX_ROWS) return;
      const id      = ++rowIdCounter;
      const color   = initData.color || PALETTE[0];
      const isFirst = getRowCount() === 0;
      rowColors[id] = color;

      const div = document.createElement('div');
      div.className = 'form-group';
      div.id        = `row-${id}`;

      if (!isFirst) {
        div.draggable = true;
        div.addEventListener('dragstart',  (e) => onDragStart(e, id));
        div.addEventListener('dragend',    ()  => onDragEnd(id));
        div.addEventListener('dragover',   (e) => onDragOver(e, id));
        div.addEventListener('dragleave',  ()  => onDragLeave(id));
        div.addEventListener('drop',       (e) => onDrop(e, id));
      }

      div.innerHTML = `
        <div class="drag-handle ${isFirst ? 'fixed' : ''}">⠿</div>
        <input class="input-type" type="text" id="type-${id}" placeholder="구분" value="${initData.type || ''}">
        <div class="color-pick" id="cp-${id}" style="background:${color};" onclick="toggleColorPop(event,${id})">
          <div class="color-popup" id="pop-${id}"></div>
        </div>
        <div class="addr-wrap">
          <input class="input-addr" type="text" id="addr-${id}" placeholder="주소 또는 지명 입력" autocomplete="off">
          <div class="autocomplete-list" id="ac-${id}"></div>
        </div>
        <input class="input-memo" type="text" id="memo-${id}" placeholder="면적·단가 메모">
        <div class="dist-cell ${isFirst ? 'is-main' : ''}" id="dist-${id}">
          <span class="dc-empty">—</span>
        </div>
        <button class="btn-del" onclick="deleteRow(${id})" title="행 삭제">×</button>
      `;
      document.getElementById('rowList').appendChild(div);

      const pop = document.getElementById(`pop-${id}`);
      PALETTE.forEach((c, ci) => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch';
        sw.style.background = c;
        sw.title = PALETTE_NAMES[ci];
        sw.onclick = (e) => {
          e.stopPropagation();
          rowColors[id] = c;
          document.getElementById(`cp-${id}`).style.background = c;
          closeAllColorPops();
        };
        pop.appendChild(sw);
      });

      const inputEl = document.getElementById(`addr-${id}`);
      inputEl.addEventListener('input',   () => onAddrInput(id));
      inputEl.addEventListener('keydown', (e) => onAddrKeydown(e, id));
      inputEl.addEventListener('blur',    () => setTimeout(() => closeAc(id), 200));

      updateAddBtn();
    }

    function deleteRow(id) {
      const el = document.getElementById(`row-${id}`);
      if (el) el.remove();
      delete rowColors[id];
      clearTimeout(acTimers[id]);
      delete acTimers[id];
      updateAddBtn();
      if (isRouteShown) clearRoute();
    }

    function getRows() {
      return [...document.querySelectorAll('#rowList .form-group')].map(div => {
        const id = parseInt(div.id.replace('row-', ''));
        return {
          id,
          type:  document.getElementById(`type-${id}`).value.trim(),
          addr:  document.getElementById(`addr-${id}`).value.trim(),
          color: rowColors[id] || PALETTE[0],
          memo:  document.getElementById(`memo-${id}`)?.value.trim() || '',
        };
      });
    }

    function getAddrValue(id) {
      const inputEl = document.getElementById(`addr-${id}`);
      return (inputEl.dataset.resolvedAddr || inputEl.value).trim();
    }

    /* ─── 자동완성 ─── */
    function onAddrInput(id) {
      const inputEl = document.getElementById(`addr-${id}`);
      inputEl.dataset.resolvedAddr = '';
      clearTimeout(acTimers[id]);
      const val = inputEl.value.trim();
      if (val.length < 2) { closeAc(id); return; }
      acTimers[id] = setTimeout(() => searchKeyword(id, val), 300);
    }

    function searchKeyword(id, keyword) {
      if (!psService) return;
      psService.keywordSearch(keyword, (data, status) => {
        if (status !== kakao.maps.services.Status.OK) { closeAc(id); return; }
        renderAc(id, data.slice(0, 7));
      });
    }

    function renderAc(id, items) {
      const list = document.getElementById(`ac-${id}`);
      list.innerHTML = '';
      acActiveIdx[id] = -1;
      items.forEach((place) => {
        const addrText = place.road_address_name || place.address_name;
        const item = document.createElement('div');
        item.className = 'ac-item';
        item.innerHTML = `<div class="ac-name">${place.place_name}</div><div class="ac-addr">${addrText}</div>`;
        item.addEventListener('mousedown', (e) => { e.preventDefault(); selectAcItem(id, place); });
        list.appendChild(item);
      });
      list.classList.add('open');
    }

    function selectAcItem(id, place) {
      const addrText = place.road_address_name || place.address_name;
      const inputEl  = document.getElementById(`addr-${id}`);
      inputEl.value  = `${place.place_name} (${addrText})`;
      inputEl.dataset.resolvedAddr = addrText;
      closeAc(id);
    }

    function closeAc(id) {
      const list = document.getElementById(`ac-${id}`);
      if (list) { list.classList.remove('open'); list.innerHTML = ''; }
      acActiveIdx[id] = -1;
    }
    function closeAllAc() {
      document.querySelectorAll('.autocomplete-list').forEach(l => { l.classList.remove('open'); l.innerHTML = ''; });
    }

    function onAddrKeydown(e, id) {
      const list  = document.getElementById(`ac-${id}`);
      const items = list.querySelectorAll('.ac-item');
      if (!list.classList.contains('open') || items.length === 0) return;
      let idx = acActiveIdx[id] ?? -1;
      if      (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); }
      else if (e.key === 'ArrowUp')   { e.preventDefault(); idx = Math.max(idx - 1, 0); }
      else if (e.key === 'Enter')     { e.preventDefault(); if (idx >= 0) items[idx].dispatchEvent(new Event('mousedown')); return; }
      else if (e.key === 'Escape')    { closeAc(id); return; }
      else return;
      items.forEach(i => i.classList.remove('active'));
      if (idx >= 0) items[idx].classList.add('active');
      acActiveIdx[id] = idx;
    }

    /* ─── 드래그 앤 드롭 ─── */
    function onDragStart(e, id) {
      dragSrcId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => document.getElementById(`row-${id}`)?.classList.add('dragging'), 0);
    }
    function onDragEnd(id) {
      dragSrcId = null;
      document.getElementById(`row-${id}`)?.classList.remove('dragging');
      document.querySelectorAll('.form-group').forEach(r => r.classList.remove('drag-over'));
    }
    function onDragOver(e, id) {
      e.preventDefault();
      const rows   = [...document.querySelectorAll('#rowList .form-group')];
      const target = document.getElementById(`row-${id}`);
      if (target === rows[0]) return;
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.form-group').forEach(r => r.classList.remove('drag-over'));
      target.classList.add('drag-over');
    }
    function onDragLeave(id) { document.getElementById(`row-${id}`)?.classList.remove('drag-over'); }
    function onDrop(e, targetId) {
      e.preventDefault();
      if (!dragSrcId || dragSrcId === targetId) return;
      const list   = document.getElementById('rowList');
      const rows   = [...list.querySelectorAll('.form-group')];
      const srcEl  = document.getElementById(`row-${dragSrcId}`);
      const tgtEl  = document.getElementById(`row-${targetId}`);
      if (tgtEl === rows[0]) { tgtEl.classList.remove('drag-over'); return; }
      const srcIdx = rows.indexOf(srcEl);
      const tgtIdx = rows.indexOf(tgtEl);
      list.insertBefore(srcEl, srcIdx < tgtIdx ? tgtEl.nextSibling : tgtEl);
      tgtEl.classList.remove('drag-over');
      if (isRouteShown) { clearRoute(); resetDistCells(); }
    }

    function toggleColorPop(e, id) {
      e.stopPropagation();
      const pop    = document.getElementById(`pop-${id}`);
      const isOpen = pop.classList.contains('open');
      closeAllColorPops();
      if (!isOpen) pop.classList.add('open');
    }
    function closeAllColorPops() {
      document.querySelectorAll('.color-popup').forEach(p => p.classList.remove('open'));
    }

    /* ─── 거리 셀 ─── */
    function resetDistCells() {
      document.querySelectorAll('.dist-cell:not(.is-main)').forEach(el => {
        el.innerHTML = '<span class="dc-empty">—</span>';
      });
    }
    function setDistCell(rowId, result, linearDist) {
      const cell = document.getElementById(`dist-${rowId}`);
      if (!cell) return;
      const linHtml = linearDist != null
        ? `<span class="dc-line">↔ ${formatDistance(linearDist)}</span>` : '';
      cell.innerHTML = result
        ? `<span class="dc-time">🕐 ${formatDuration(result.durationSec)}</span>
           <span class="dc-dist">🚗 ${formatDistance(result.distanceMeter)}</span>
           ${linHtml}`
        : `<span class="dc-empty" style="color:#f4a9a9;">경로없음</span>
           ${linHtml}`;
    }

    /* ─── 지도 초기화 ─── */
    function initMap() {
      map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(37.5665, 126.9780), level: 7
      });
      geocoder  = new kakao.maps.services.Geocoder();
      psService = new kakao.maps.services.Places();

      // 지적편집도 기본 ON
      map.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
      document.getElementById('cadastralBtn').classList.add('active');

      // 줌/이동 시 경로 패널 위치 유지
      kakao.maps.event.addListener(map, 'click', () => { closePopup(); closeAllAc(); });
      kakao.maps.event.addListener(map, 'zoom_changed', positionRoutePanel);
      kakao.maps.event.addListener(map, 'dragend', positionRoutePanel);
      window.addEventListener('resize', positionRoutePanel);
      document.addEventListener('click', (e) => {
        closeAllColorPops();
        if (!e.target.closest('.addr-wrap')) closeAllAc();
      });

      INIT_ROWS.forEach(r => addRow(r));
    }

    /* ─── 지적편집도 토글 ─── */
    function toggleCadastral() {
      isCadastral = !isCadastral;
      const btn = document.getElementById('cadastralBtn');
      if (isCadastral) {
        map.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
        btn.classList.add('active');
      } else {
        map.removeOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
        btn.classList.remove('active');
      }
    }

    /* ─── 주소 조회 ─── */
    function geocodeAddress(addr) {
      return new Promise((resolve) => {
        geocoder.addressSearch(addr, (result, status) => {
          resolve(status === kakao.maps.services.Status.OK
            ? new kakao.maps.LatLng(result[0].y, result[0].x) : null);
        });
      });
    }

    async function searchAddresses() {
      clearMarkers();
      markerList = [];
      resetDistCells();
      if (isRouteShown) clearRoute();

      const rows      = getRows().filter(r => getAddrValue(r.id));
      const offsetMap = new Map();
      const slots     = new Array(rows.length).fill(null);

      await Promise.all(rows.map((row, idx) => {
        const addr = getAddrValue(row.id);
        return geocodeAddress(addr).then(pos => {
          if (pos) slots[idx] = { ...row, pos, addr };
        });
      }));

      let firstPos = null;
      const allRows = [...document.querySelectorAll('#rowList .form-group')];
      const firstRowId = allRows.length > 0 ? parseInt(allRows[0].id.replace('row-', '')) : -1;

      for (const slot of slots) {
        if (!slot) continue;
        const { pos, type, addr, color, memo, id } = slot;
        const label    = type || '?';
        const isMain   = id === firstRowId;
        if (!firstPos) { firstPos = pos; map.setCenter(pos); }
        const displayPos = applyOffset(pos, offsetMap);
        placeMarker(displayPos, label, addr, color, memo, isMain);
        markerList.push({ rawPos: pos, displayPos, label, addr, color, memo, rowId: id });
      }
    }

    function applyOffset(pos, offsetMap) {
      const key   = `${pos.getLat().toFixed(5)},${pos.getLng().toFixed(5)}`;
      const count = offsetMap.get(key) || 0;
      offsetMap.set(key, count + 1);
      if (count === 0) return pos;
      const stepLat = 30 / 111320;
      const stepLng = 30 / (111320 * Math.cos(pos.getLat() * Math.PI / 180));
      const angle   = ((count - 1) % 8) * (Math.PI / 4);
      const radius  = Math.ceil(count / 8);
      return new kakao.maps.LatLng(
        pos.getLat() + Math.sin(angle) * radius * stepLat,
        pos.getLng() + Math.cos(angle) * radius * stepLng
      );
    }

    function placeMarker(pos, label, addr, color, memo, isMain) {
      const el = document.createElement('div');
      el.className = 'kakao-marker';
      el.style.background = color;
      el.innerHTML = `<span class="mk-icon">${isMain ? '★' : '●'}</span>${label}`;
      el.onclick = (e) => { e.stopPropagation(); showPopup(pos, label, addr, memo); };
      const overlay = new kakao.maps.CustomOverlay({ position: pos, content: el, yAnchor: 1.5 });
      overlay.setMap(map);
      markerOverlays.push(overlay);
    }

    function clearMarkers() {
      markerOverlays.forEach(o => o.setMap(null));
      markerOverlays = [];
      closePopup();
    }

    /* ─── 팝업 ─── */
    function showPopup(pos, label, addr, memo) {
      closePopup();
      const el = document.createElement('div');
      el.className = 'marker-popup';
      const memoHtml = memo ? `<div class="pop-memo">📋 ${memo}</div>` : '';
      el.innerHTML = `
        <div class="pop-close" onclick="closePopup()">×</div>
        <div class="pop-title">${label}</div>
        <div class="pop-addr">${addr}</div>
        ${memoHtml}
      `;
      popupOverlay = new kakao.maps.CustomOverlay({ position: pos, content: el, yAnchor: 1.8, zIndex: 10 });
      popupOverlay.setMap(map);
    }
    function closePopup() {
      if (popupOverlay) { popupOverlay.setMap(null); popupOverlay = null; }
    }

    /* ─── 경로 (OSRM) ─── */
    async function getOsrmRoute(from, to) {
      try {
        const coords = `${from.getLng()},${from.getLat()};${to.getLng()},${to.getLat()}`;
        const res    = await fetch(`${OSRM}/${coords}?overview=full&geometries=geojson`);
        const data   = await res.json();
        if (data.code !== 'Ok' || !data.routes.length) return null;
        return {
          durationSec:   Math.round(data.routes[0].duration),
          distanceMeter: Math.round(data.routes[0].distance),
          coords:        data.routes[0].geometry.coordinates,
        };
      } catch { return null; }
    }

    async function toggleRoute() {
      if (isRouteShown) { clearRoute(); return; }
      if (markerList.length < 2) { alert('주소를 2개 이상 입력 후 조회해주세요.'); return; }

      markerList = markerList.filter((item, idx, arr) =>
        arr.findIndex(m => m.rowId === item.rowId) === idx
      );
      const currentOrder = [...document.querySelectorAll('#rowList .form-group')]
        .map(div => parseInt(div.id.replace('row-', '')));
      markerList.sort((a, b) => currentOrder.indexOf(a.rowId) - currentOrder.indexOf(b.rowId));

      isRouteShown = true;
      document.getElementById('routeBtn').textContent = '경로 숨기기';
      document.getElementById('routeBtn').classList.add('active');
      positionRoutePanel();
      document.getElementById('routePanel').style.display = 'block';

      const routeList = document.getElementById('routeList');
      routeList.innerHTML = '<div style="font-size:11px;color:#888;padding:4px 0;">경로 계산 중...</div>';

      let totalSec = 0, totalMeter = 0;
      const seqItems = [];

      for (let i = 0; i < markerList.length - 1; i++) {
        const color  = ROUTE_COLORS[i % ROUTE_COLORS.length];
        const result = await getOsrmRoute(markerList[i].rawPos, markerList[i+1].rawPos);
        if (result) {
          totalSec   += result.durationSec;
          totalMeter += result.distanceMeter;
          const path = result.coords.map(([lng, lat]) => new kakao.maps.LatLng(lat, lng));
          routePolylines.push(new kakao.maps.Polyline({
            map, path, strokeWeight: 4, strokeColor: color, strokeOpacity: 0.85, strokeStyle: 'solid'
          }));
        }
        seqItems.push({ from: markerList[i].label, to: markerList[i+1].label, color, result });
      }

      const mainPos = markerList[0].rawPos;
      for (let i = 1; i < markerList.length; i++) {
        const result      = await getOsrmRoute(mainPos, markerList[i].rawPos);
        const linearDist  = calcLinearDist(mainPos, markerList[i].rawPos);
        setDistCell(markerList[i].rowId, result, linearDist);
      }

      routeList.innerHTML = '';
      seqItems.forEach(({ from, to, color, result }) => {
        const item = document.createElement('div');
        item.className = 'route-item';
        item.innerHTML = result
          ? `<div class="route-dot" style="background:${color};"></div>
             <span class="route-seg">${from} → ${to}</span>
             <span class="route-time">🕐 ${formatDuration(result.durationSec)}</span>
             <span class="route-dist">📍 ${formatDistance(result.distanceMeter)}</span>`
          : `<div class="route-dot" style="background:#ccc;"></div>
             <span class="route-seg" style="color:#aaa;">${from} → ${to}: 경로없음</span>`;
        routeList.appendChild(item);
      });

      document.getElementById('routeTotal').innerHTML = `
        <div class="route-total">
          <div class="route-total-row">
            <span class="route-total-label">총 이동시간</span>
            <span class="route-total-val time">${formatDuration(totalSec)}</span>
          </div>
          <div class="route-total-row">
            <span class="route-total-label">총 이동거리</span>
            <span class="route-total-val dist">${formatDistance(totalMeter)}</span>
          </div>
        </div>`;
    }

    /* ─── 경로 패널 위치 계산 ─── */
    function positionRoutePanel() {
      const panel = document.querySelector('.form-container');
      const rp    = document.getElementById('routePanel');
      if (!panel || !rp) return;
      const rect = panel.getBoundingClientRect();
      // 패널 바로 아래 + 여백 8px
      rp.style.top  = (rect.bottom + 8) + 'px';
      rp.style.left = rect.left + 'px';
    }

    /* ─── 경로 패널 위치 계산 (입력 패널 바로 아래) ─── */
    function positionRoutePanel() {
      const panel = document.querySelector('.form-container');
      const rp    = document.getElementById('routePanel');
      if (!panel || !rp || rp.style.display === 'none') return;
      const rect = panel.getBoundingClientRect();
      rp.style.top  = (rect.bottom + 8) + 'px';
      rp.style.left = rect.left + 'px';
    }

    function clearRoute() {
      routePolylines.forEach(p => p.setMap(null));
      routePolylines = [];
      isRouteShown = false;
      document.getElementById('routeBtn').textContent = '경로 보기';
      document.getElementById('routeBtn').classList.remove('active');
      document.getElementById('routePanel').style.display = 'none';
      document.getElementById('routeList').innerHTML = '';
      document.getElementById('routeTotal').innerHTML = '';
    }

    function clearAll() {
      clearMarkers(); clearRoute(); resetDistCells();
      markerList = [];
      document.getElementById('rowList').innerHTML = '';
      rowIdCounter = 0; rowColors = {};
      INIT_ROWS.forEach(r => addRow(r));
    }

    /* ─── 인쇄 / 캡처 ─── */
    function toggleCaptureBar() {
      document.getElementById('captureBar').classList.toggle('show');
    }

    function doPrint() {
      const panel = document.querySelector('.form-container');
      const rp    = document.getElementById('routePanel');
      const cb    = document.getElementById('captureBar');
      panel.style.display = 'none';
      if (rp) rp.style.display = 'none';
      cb.classList.remove('show');
      setTimeout(() => {
        map.relayout();
        setTimeout(() => {
          window.print();
          setTimeout(() => {
            panel.style.display = '';
            if (rp && isRouteShown) rp.style.display = 'block';
            map.relayout();
          }, 800);
        }, 300);
      }, 100);
    }

    function doScreenshot() {
      document.getElementById('captureBar').classList.remove('show');
      const panel = document.querySelector('.form-container');
      const rp    = document.getElementById('routePanel');
      panel.style.display = 'none';
      if (rp) rp.style.display = 'none';
      map.relayout();

      // 토스트 메시지 표시
      const toast = document.createElement('div');
      toast.id = 'shotToast';
      toast.style.cssText = [
        'position:fixed', 'top:50%', 'left:50%',
        'transform:translate(-50%,-50%)',
        'background:rgba(0,0,0,0.78)', 'color:#fff',
        'font-size:14px', 'font-weight:600',
        'padding:18px 32px', 'border-radius:12px',
        'z-index:9999', 'text-align:center', 'line-height:1.8',
        'pointer-events:none', 'font-family:Noto Sans KR,sans-serif',
        'box-shadow:0 4px 20px rgba(0,0,0,0.3)'
      ].join(';');
      toast.innerHTML = '📷 지금 스크린샷을 찍어주세요!<br>'
        + '<span style="font-size:11px;opacity:0.75;font-weight:400;">'
        + 'Windows: Win+Shift+S &nbsp;|&nbsp; Mac: Cmd+Shift+4</span>';
      document.body.appendChild(toast);

      // 3초 후 토스트 제거 + 패널 복원
      setTimeout(() => {
        toast.remove();
        panel.style.display = '';
        if (rp && isRouteShown) rp.style.display = 'block';
        map.relayout();
      }, 3000);
    }

    /* ─── 유틸 ─── */
    /* ─── 직선거리 계산 (Haversine) ─── */
    function calcLinearDist(from, to) {
      const R    = 6371000; // 지구 반지름 (m)
      const lat1 = from.getLat() * Math.PI / 180;
      const lat2 = to.getLat()   * Math.PI / 180;
      const dLat = (to.getLat() - from.getLat()) * Math.PI / 180;
      const dLng = (to.getLng() - from.getLng()) * Math.PI / 180;
      const a    = Math.sin(dLat/2) * Math.sin(dLat/2)
                 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng/2) * Math.sin(dLng/2);
      return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function formatDuration(sec) {
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
      return h > 0 ? `${h}시간 ${m}분` : `${m}분`;
    }
    function formatDistance(m) { return m >= 1000 ? `${(m/1000).toFixed(1)}km` : `${m}m`; }

    initMap();
  </script>
</body>
