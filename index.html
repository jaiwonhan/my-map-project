<!DOCTYPE html>
<html>
<head>
  <title>물건/유사사례/매매사례 위치도</title>
  <meta charset="utf-8">
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=6eeecb35764068b879f54c7b4bd79610&libraries=services,clusterer"></script>
  <style>
    .marker {
      display: inline-block;
      padding: 3px 5px;
      border-radius: 5px;
      border: 1px solid #0044CC;
      font-size: 8px;
      font-weight: bold;
      text-align: center;
      color: black;
    }
    .marker.type1 { background-color: #A8B9FF; }
    .marker.type2, .marker.type3, .marker.type4 { background-color: #D1E8FF; }
    .marker.type5, .marker.type6, .marker.type7,
    .marker.type8, .marker.type9 { background-color: #E8FFD1; }
    .form-container {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
      z-index: 1;
    }
    .form-group {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .form-group label {
      width: 100px;
      text-align: right;
      margin-right: 10px;
    }
    .form-group input {
      width: calc(100% - 120px);
      height: 25px;
      padding: 5px;
      font-size: 14px;
    }
    button { font-size: 14px; padding: 5px 10px; }
    #map {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
    }
  </style>
</head>
<body onload="initMap()">
  <div class="form-container">
    <h1>물건/유사사례/매매사례 위치도</h1>
    <form onsubmit="event.preventDefault(); searchAddresses();">
      <div id="addresses">
        <div class="form-group">
          <label>본건:</label>
          <input type="text" id="addressInput1" placeholder="예: 서울특별시 중구 세종대로 110">
        </div>
        <div class="form-group">
          <label>사례1:</label>
          <input type="text" id="addressInput2" placeholder="예: 서울특별시 강남구 테헤란로 152">
        </div>
        <div class="form-group">
          <label>사례2:</label>
          <input type="text" id="addressInput3" placeholder="예: 부산광역시 해운대구 우동 1468">
        </div>
        <div class="form-group">
          <label>사례3:</label>
          <input type="text" id="addressInput4" placeholder="예: 대전광역시 서구 둔산대로 100">
        </div>
        <div class="form-group">
          <label>실거래1:</label>
          <input type="text" id="addressInput5" placeholder="예: 대구광역시 북구 팔달로 10">
        </div>
        <div class="form-group">
          <label>실거래2:</label>
          <input type="text" id="addressInput6" placeholder="예: 광주광역시 남구 봉선로 1">
        </div>
        <div class="form-group">
          <label>실거래3:</label>
          <input type="text" id="addressInput7" placeholder="예: 제주특별자치도 제주시 중앙로 120">
        </div>
        <div class="form-group">
          <label>실거래4:</label>
          <input type="text" id="addressInput8" placeholder="예: 울산광역시 남구 삼산로 150">
        </div>
        <div class="form-group">
          <label>실거래5:</label>
          <input type="text" id="addressInput9" placeholder="예: 인천광역시 연수구 송도국제대로 10">
        </div>
      </div>
      <button type="submit">주소 조회</button>
    </form>
  </div>
  <div id="map"></div>

  <script>
    let map;
    let clusterer;
    let existingMarkers = [];
    let offsetMap = new Map();

    function initMap() {
      map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(37.5665, 126.9780),
        level: 7
      });
      clusterer = new kakao.maps.MarkerClusterer({
        map: map,
        averageCenter: true,
        minLevel: 7
      });
    }

    function getLongitudeOffset(lat, meters) {
      const earthRadius = 6378137;
      const latRad = (Math.PI / 180) * lat;
      return meters / (Math.cos(latRad) * earthRadius) * (180 / Math.PI);
    }

    function applyOffset(coords) {
      const coordKey = `${coords.getLat()},${coords.getLng()}`;
      const count = offsetMap.get(coordKey) || 0;
      offsetMap.set(coordKey, count + 1);

      if (count === 0) return coords; // 첫 번째는 원위치

      // count 1부터 오프셋 적용: 30m 간격으로 8방향 분산
      const stepLat = 30 / 111320;
      const stepLng = getLongitudeOffset(coords.getLat(), 30);
      const angle = ((count - 1) % 8) * (Math.PI / 4);
      const radius = Math.ceil(count / 8);

      return new kakao.maps.LatLng(
        coords.getLat() + Math.sin(angle) * radius * stepLat,
        coords.getLng() + Math.cos(angle) * radius * stepLng
      );
    }

    // ✅ 핵심: Promise로 감싸서 순차 처리
    function geocodeAddress(geocoder, address) {
      return new Promise((resolve) => {
        geocoder.addressSearch(address, (result, status) => {
          if (status === kakao.maps.services.Status.OK) {
            resolve({ lat: result[0].y, lng: result[0].x });
          } else {
            resolve(null); // 실패해도 다음으로 진행
          }
        });
      });
    }

    async function searchAddresses() {
      resetMarkers();
      const geocoder = new kakao.maps.services.Geocoder();
      let firstCoords = null;

      for (let i = 1; i <= 9; i++) {
        const address = document.getElementById("addressInput" + i).value.trim();
        if (!address) continue;

        const result = await geocodeAddress(geocoder, address); // ✅ 순차 실행
        if (!result) {
          console.error(`"${address}"를 찾을 수 없습니다.`);
          continue;
        }

        let coords = new kakao.maps.LatLng(result.lat, result.lng);

        if (!firstCoords) {
          firstCoords = coords;
          map.setCenter(coords);
        }

        coords = applyOffset(coords); // 순차 실행이므로 오프셋 누적 보장
        const marker = createHtmlMarker(coords, i);
        existingMarkers.push(marker);
        marker.setMap(map);
        clusterer.addMarker(marker);
      }
    }

    function resetMarkers() {
      existingMarkers.forEach(marker => marker.setMap(null));
      clusterer.clear();
      existingMarkers = [];
      offsetMap.clear();
    }

    function createHtmlMarker(coords, type) {
      const el = document.createElement("div");
      el.className = `marker type${type}`;
      el.innerText = type === 1 ? "본건" : type <= 4 ? `사례${type - 1}` : `실거래${type - 4}`;
      return new kakao.maps.CustomOverlay({
        position: coords,
        content: el,
      });
    }
  </script>
</body>
</html>
